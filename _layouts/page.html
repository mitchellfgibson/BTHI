---
layout: default
---
<div class="container">
  <div class="page-hero">
    {% if page.kicker %}<span class="kicker">{{ page.kicker }}</span>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
    {% if page.byline %}<div class="byline">{{ page.byline }}</div>{% endif %}
  </div>
  <div class="content-wrap">
    {{ content }}
  </div>
</div>
